name: Bug report
description: Report a malfunction in the app
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more info you provide,
        the faster we can fix it.

  - type: input
    id: app-version
    attributes:
      label: App version
      description: Visible under _More → About_ or in the name of the APK you downloaded
      placeholder: "v1.0.0-beta or v0.1.53"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Device model + Android version
      placeholder: "Samsung A54 · Android 14"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: As precise as possible
      placeholder: |
        1. Open the Nutrition tab
        2. Search for "chicken"
        3. Tap the first result
        4. Pick portion mode "Palm", quantity 1
        5. Tap Add → app crashes
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: If you have a PC with ADB, paste `adb logcat -d -s AndroidRuntime:E` output here
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
