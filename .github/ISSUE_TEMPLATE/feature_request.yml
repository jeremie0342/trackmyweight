name: Feature request
description: Proposer une nouvelle fonctionnalité ou amélioration
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Avant de proposer, vérifie qu'une issue similaire n'existe pas déjà,
        et consulte la roadmap dans le README.

  - type: textarea
    id: problem
    attributes:
      label: Quel problème résous-tu ?
      description: Décris le besoin utilisateur, pas la solution.
      placeholder: "Je perds du temps à chercher mes derniers records par exercice."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Solution proposée
      description: Comment tu vois la fonctionnalité (mocks/wireframes bienvenus)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
      description: As-tu pensé à d'autres façons de résoudre ça ?

  - type: dropdown
    id: complexity
    attributes:
      label: Complexité estimée
      options:
        - "Petit (< 1 jour de code)"
        - "Moyen (2-5 jours)"
        - "Gros (semaine+)"
        - "Aucune idée"

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: Je suis prêt·e à contribuer avec une PR
        - label: J'ai besoin d'aide pour l'implémenter
