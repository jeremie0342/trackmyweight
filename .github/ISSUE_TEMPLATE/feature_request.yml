name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before proposing, check that no similar issue already exists, and read
        the roadmap in the README.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user need, not the solution.
      placeholder: "I waste time looking up my recent PRs by exercise."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you envision the feature (mocks/wireframes welcome)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you thought of other ways to solve this?

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated complexity
      options:
        - "Small (< 1 day of code)"
        - "Medium (2-5 days)"
        - "Large (a week+)"
        - "No idea"

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to contribute a PR
        - label: I need help implementing this
