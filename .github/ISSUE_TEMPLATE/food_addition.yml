name: Ajout d'aliment à la base
description: Proposer un aliment manquant (Bénin, Afrique, autre région francophone)
title: "[Food] "
labels: ["food-database", "help-wanted"]
body:
  - type: input
    id: name
    attributes:
      label: Nom de l'aliment
      placeholder: "Yassa poulet"
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: Région
      options:
        - "BENIN"
        - "WEST_AFRICA"
        - "INTERNATIONAL"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Catégorie
      options:
        - "GRAIN"
        - "PROTEIN_ANIMAL"
        - "PROTEIN_PLANT"
        - "VEGETABLE"
        - "FRUIT"
        - "DAIRY"
        - "FAT"
        - "SAUCE"
        - "BEVERAGE"
        - "SNACK"
        - "COMPOSED_DISH"
    validations:
      required: true

  - type: input
    id: kcal
    attributes:
      label: kcal / 100g
    validations:
      required: true

  - type: input
    id: protein
    attributes:
      label: Protéines / 100g (g)
    validations:
      required: true

  - type: input
    id: carbs
    attributes:
      label: Glucides / 100g (g)
    validations:
      required: true

  - type: input
    id: fats
    attributes:
      label: Lipides / 100g (g)
    validations:
      required: true

  - type: input
    id: serving
    attributes:
      label: Portion typique
      placeholder: "1 assiette (200 g)"
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Sources
      description: Cite la table de référence (FAO West Africa, CIQUAL, INRAN, etc.)
    validations:
      required: true
