name: Add a food to the database
description: Propose a missing food (Benin, Africa, or any region)
title: "[Food] "
labels: ["food-database", "help-wanted"]
body:
  - type: input
    id: name
    attributes:
      label: Food name
      placeholder: "Yassa chicken"
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: Region
      options:
        - "BENIN"
        - "WEST_AFRICA"
        - "INTERNATIONAL"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - "GRAIN"
        - "PROTEIN_ANIMAL"
        - "PROTEIN_PLANT"
        - "VEGETABLE"
        - "FRUIT"
        - "DAIRY"
        - "FAT"
        - "SAUCE"
        - "BEVERAGE"
        - "SNACK"
        - "COMPOSED_DISH"
    validations:
      required: true

  - type: input
    id: kcal
    attributes:
      label: kcal / 100g
    validations:
      required: true

  - type: input
    id: protein
    attributes:
      label: Protein / 100g (g)
    validations:
      required: true

  - type: input
    id: carbs
    attributes:
      label: Carbs / 100g (g)
    validations:
      required: true

  - type: input
    id: fats
    attributes:
      label: Fats / 100g (g)
    validations:
      required: true

  - type: input
    id: serving
    attributes:
      label: Typical serving
      placeholder: "1 plate (200 g)"
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Sources
      description: Cite the reference table (FAO West Africa, CIQUAL, INRAN, etc.)
    validations:
      required: true
