name: Android build & release

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub Release with the APK"
        type: boolean
        default: true

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Decode debug keystore
        env:
          KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > app/keystore/debug.keystore
            echo "Using debug keystore from secret."
          else
            echo "No DEBUG_KEYSTORE_BASE64 secret set — falling back to AGP auto-generated keystore (signatures will differ per build)."
          fi

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew || true

      - name: Ensure gradle wrapper exists
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Bootstrapping Gradle wrapper..."
            curl -sL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1 --distribution-type bin
            chmod +x ./gradlew
          fi

      - name: Compute version tag
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y.%m.%d')
          BUILD_NUM=${{ github.run_number }}
          TAG="v0.1.${BUILD_NUM}-${SHORT_SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "build_num=$BUILD_NUM" >> $GITHUB_OUTPUT

      - name: Build debug APK
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
          APP_VERSION_NAME: ${{ steps.version.outputs.tag }}
          APP_VERSION_CODE: ${{ steps.version.outputs.build_num }}
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        id: rename
        run: |
          SRC=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          DEST="trackmyweight-${{ steps.version.outputs.tag }}.apk"
          mv "$SRC" "$DEST"
          echo "apk_path=$DEST" >> $GITHUB_OUTPUT
          echo "apk_name=$DEST" >> $GITHUB_OUTPUT
          echo "SHA256: $(sha256sum "$DEST" | cut -d' ' -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.version.outputs.tag }}
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 30

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main' || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TrackMyWeight ${{ steps.version.outputs.tag }}
          body: |
            Debug build automatique.

            - Commit : ${{ github.sha }}
            - Date : ${{ steps.version.outputs.date }}
            - Build #${{ steps.version.outputs.build_num }}

            **Installation** : télécharge l'APK et installe depuis ton téléphone (autoriser les sources inconnues pour ton navigateur si besoin).
          files: ${{ steps.rename.outputs.apk_path }}
          prerelease: true
          make_latest: true

  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Ensure gradle wrapper exists
        run: |
          if [ ! -f "./gradlew" ]; then
            curl -sL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1 --distribution-type bin
            chmod +x ./gradlew
          fi
      - name: Run JVM unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/

  instrumented-tests:
    name: Instrumented tests (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        api-level: [30]
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradle wrapper exists
        run: |
          if [ ! -f "./gradlew" ]; then
            curl -sL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1 --distribution-type bin
            chmod +x ./gradlew
          fi

      - name: AVD cache
        id: avd-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD & warm up
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          ram-size: 4096M
          heap-size: 512M
          disk-size: 6144M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD ready"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          ram-size: 4096M
          heap-size: 512M
          disk-size: 6144M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload instrumented test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
